<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordian Component</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: #343a40;
            line-height: 1;
        }
        img{
            height: 200px;
            border-radius: 8px;
            transform: scale(1.5); 
            box-shadow: 0 12px 24px rgba(0,0,0,0.25);
        }
        .carousel{
            width:800px;
            margin: 100px auto;
            border-radius: 8px;
            color: white;
            background-color: #087f5b;
            padding: 32px;
            padding-left: 86px;
            position: relative;
            box-shadow: 0 12px 24px rgba(0,0,0,0.25);

            display:flex;
            /* align-items: center; */
            gap:86px;
        }
        .text{
            font-size: 18px;
            line-height: 1.5;
            font-weight: 500;
            margin-bottom: 32px;
        }
        .author{
            font-size: 14px;
                margin-bottom: 4px;
        }
        .job{
            font-size: 12px;
        }
        .btn{
            border: none;
            background-color: white;
            height: 36px;
            width: 36px;
            border-radius: 50%;
            box-shadow: 0 12px 24px rgba(0,0,0,0.25);
            position:absolute;

            display:flex;
            align-items: center;
            justify-content: center;
        }
        .prev{
            width: 20px;
            height: 20px;
            stroke:#087f5b;
        }
        .next{
            width: 20px;
            height: 20px;
            stroke:#087f5b;
        }
        .btn--left{
            left: 0;
            top:50%;
            transform: translate(-50%, -50%);
        }
        .btn--right{
            right: 0;
            top:50%;
            transform: translate(50%, -50%);
        }
        .dot{
            border-radius: 50%;
            height: 12px;
            width: 12px;
            background-color: white;
            border: 2px solid #087f5b;
        }
        .dots{
            position: absolute;
            left:50%;
            bottom: 0;
            transform: translate(-50%, 32px);

            display: flex;
            gap: 12px;
        }
        .filled{
            background-color: #087f5b;
        }


    </style>

</head>
<body>
    <div class="carousel">
        <img src="maria.jpg"/>
        <blockquote class="testimonial">
            <p class="text">“The team delivered an excellent result and made the entire process very smooth. The design was modern, clean, and exactly what we were looking for. I truly appreciate the professionalism and attention to detail.”</p>
            <p class="author">- Maria de Almeida</p>
            <p class="job">Senior Product Manager at EDP Comercial</p>
        </blockquote>
        <button class="btn btn--left">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="prev">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
            </svg>
        </button>
        <button class="btn btn--right">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="next">
                <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
            </svg>
        </button>   
        <div class="dots">
            <button class="dot filled"></button>
            <button class="dot"></button>
            <button class="dot"></button>
            <button class="dot"></button>
        </div>
    </div>
</body>
</html>
