<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordian Component</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: #343a40;
            line-height: 1;
            justify-content: center;
        }
        .pagination{
            width: 400px;
            margin: 100px auto;

            /* position:relative; */
            display: flex;
            align-items: center;
            gap:12px;
        }
        .btn{
            border: 2px solid #087f5b;
            background-color: white;
            height: 36px;
            width: 36px;
            border-radius: 50%;
            box-shadow: 0 12px 24px rgba(0,0,0,0.25);
            /* position:absolute; */

            display:flex;
            align-items: center;
            justify-content: center;
        }
        .prev{
            width: 20px;
            height: 20px;
            stroke:#087f5b;
        }
        .next{
            width: 20px;
            height: 20px;
            stroke:#087f5b;
        }
        .btn--left{
            left: 0;
            /* top:50%;
            transform: translate(-50%, -50%); */
        }
        .btn--right{
            right: 0;
            /* top:50%;
            transform: translate(50%, -50%); */
        }
        .dots{
            display:flex;
            align-items: center;
            justify-content: center;
            
        }
        .dot{
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: white;
            color: black;
            border: none;
            display:inline-block;
        }

        .dot:hover,
        .dot:active,
        .current{
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #087f5b;
            color: white;
            border: none;
        }

    </style>
</head>

<body>
    <div class="pagination">
        <button class="btn btn--left">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="prev">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
            </svg>
        </button>
        <div class="dots">
            <button class="dot">1</button>
            <button class="dot">2</button>
            <button class="dot current">3</button>
            <button class="dot">4</button>
            <button class="dot">5</button>
            <button class="dot">...</button>
            <button class="dot">10</button>
        </div>
        <button class="btn btn--right">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="next">
                <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
            </svg>
        </button>   
    </div>
</body>
